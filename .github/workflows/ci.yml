name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check shell syntax
        run: |
          bash -n agent/vexyl-guard.sh

      - name: Run agent fixtures
        run: tests/run-agent-fixtures.sh

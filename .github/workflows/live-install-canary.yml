name: Live Install Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: live-install-canary
  cancel-in-progress: false

jobs:
  live-install-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run live package-manager install canaries
        run: packaging/smoke-install-live-repositories.sh

      - name: Email failure alert
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VEXYL_ALERT_FROM: ${{ secrets.VEXYL_ALERT_FROM }}
          VEXYL_ALERT_RECIPIENTS: ${{ secrets.VEXYL_ALERT_RECIPIENTS }}
          VEXYL_ALERT_REPLY_TO: ${{ secrets.VEXYL_ALERT_REPLY_TO }}
        run: scripts/notify-workflow-failure.sh

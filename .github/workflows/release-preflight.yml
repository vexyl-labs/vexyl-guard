name: Release Preflight
run-name: Release Preflight ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to validate, for example 0.2.9"
        required: true
        type: string
      release_notes:
        description: "Human release notes to validate with the dry run"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: release-preflight-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c dpkg-dev file gnupg jq ripgrep rpm

      - name: Run release dry run
        env:
          RELEASE_NOTES_JSON: ${{ toJson(inputs.release_notes) }}
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          tag="v$version"
          notes_file="$RUNNER_TEMP/release-notes.md"

          printf '%s' "$RELEASE_NOTES_JSON" | jq -r . >"$notes_file"
          if ! grep -q '[^[:space:]]' "$notes_file"; then
            printf 'Maintenance release for Vexyl Guard %s.\n' "$tag" >"$notes_file"
          fi

          scripts/prepare-release.sh \
            --version "${{ inputs.version }}" \
            --notes-file "$notes_file" \
            --dry-run

      - name: Show dry-run version diff
        if: always()
        run: |
          git status --short
          git diff -- agent/vexyl-guard.sh pyproject.toml

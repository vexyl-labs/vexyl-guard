name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.2.8"
        required: true
        type: string
      release_notes:
        description: "Optional human release notes to prepend to generated package details"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: integrations/examples/node/package-lock.json

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c dpkg-dev file gnupg openssl ripgrep rpm
          python3 -m pip install -r integrations/examples/python/requirements-test.txt
          npm ci --prefix integrations/examples/node --ignore-scripts --no-audit --no-fund
          npm audit --prefix integrations/examples/node --omit=dev --audit-level=high

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="${{ inputs.tag }}"
          fi

          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              printf 'Release tag must look like v0.2.8, got: %s\n' "$tag" >&2
              exit 1
              ;;
          esac

          version="${tag#v}"
          agent_version="$(sed -n 's/^VERSION="\([^"]*\)".*/\1/p' agent/vexyl-guard.sh | head -n 1)"
          project_version="$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject.toml | head -n 1)"

          if [ "$agent_version" != "$version" ]; then
            printf 'Tag %s does not match agent version %s.\n' "$tag" "$agent_version" >&2
            exit 1
          fi

          if [ "$project_version" != "$version" ]; then
            printf 'Tag %s does not match pyproject version %s.\n' "$tag" "$project_version" >&2
            exit 1
          fi

          git rev-parse -q --verify "refs/tags/$tag" >/dev/null || {
            printf 'Tag does not exist in the checked out repository: %s\n' "$tag" >&2
            exit 1
          }

          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"

      - name: Check shell syntax
        run: |
          bash -n agent/vexyl-guard.sh
          bash -n packaging/build-packages.sh
          bash -n packaging/build-repositories.sh
          sh -n packaging/install-report.sh
          bash -n packaging/sign-rpm-packages.sh
          bash -n packaging/smoke-install-repositories.sh
          bash -n packaging/install-local.sh
          bash -n scripts/notify-workflow-failure.sh
          bash -n packaging/verify-package-contents.sh
          bash -n packaging/verify-repositories.sh

      - name: Run agent fixtures
        run: tests/run-agent-fixtures.sh

      - name: Run framework integration contracts
        run: |
          python3 -m unittest tests/test_public_intel.py tests/test_framework_integrations.py tests/test_intel_updates.py tests/test_example_apps.py -v
          node tests/test_node_gateway_client.mjs
          node tests/test_node_framework_integrations.mjs
          node tests/test_express_example.mjs
          python3 -m tests.run_gateway_conformance
          python3 -m tests.run_example_compatibility

      - name: Build packages
        run: packaging/build-packages.sh --format all --version "${{ steps.meta.outputs.version }}"

      - name: Verify package contents
        run: packaging/verify-package-contents.sh dist/packages/*

      - name: Check public CLI fallback database
        run: |
          tmp="$(mktemp -d)"
          dpkg-deb -x dist/packages/*.deb "$tmp"
          PYTHONPATH="$tmp/opt/vexyl" "$tmp/usr/bin/vexyl" threat --db "$tmp/var/lib/vexyl/ai_threats.sqlite" seed
          PYTHONPATH="$tmp/opt/vexyl" "$tmp/usr/bin/vexyl" threat --db "$tmp/var/lib/vexyl/ai_threats.sqlite" search prompt

      - name: Build signed package repositories
        env:
          VEXYL_PACKAGE_REPO_SIGNING_PRIVATE_KEY_ASC: ${{ secrets.VEXYL_PACKAGE_REPO_SIGNING_PRIVATE_KEY_ASC }}
        run: |
          if [ -z "$VEXYL_PACKAGE_REPO_SIGNING_PRIVATE_KEY_ASC" ]; then
            printf 'Missing VEXYL_PACKAGE_REPO_SIGNING_PRIVATE_KEY_ASC secret.\n' >&2
            exit 1
          fi

          repo_private_key="$RUNNER_TEMP/vexyl-package-repo-private.asc"
          printf '%s\n' "$VEXYL_PACKAGE_REPO_SIGNING_PRIVATE_KEY_ASC" >"$repo_private_key"
          chmod 0600 "$repo_private_key"

          packaging/sign-rpm-packages.sh \
            --signing-key "$repo_private_key" \
            dist/packages/*.rpm

          packaging/build-repositories.sh \
            --packages-dir dist/packages \
            --output-dir dist/repositories \
            --signing-key "$repo_private_key"

          packaging/verify-repositories.sh dist/repositories dist/repositories/vexyl-packages.asc
          packaging/smoke-install-repositories.sh dist/repositories

          tar -C dist/repositories \
            -czf "dist/packages/vexyl-package-repositories-${{ steps.meta.outputs.tag }}.tar.gz" .
          cp dist/repositories/vexyl-packages.asc dist/packages/vexyl-package-repo-signing-public.asc

      - name: Generate checksums
        run: |
          cd dist/packages
          find . -maxdepth 1 -type f \
            ! -name 'SHA256SUMS' \
            ! -name 'SHA256SUMS.sig' \
            ! -name 'release-signing-public.pem' \
            -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS
          cp ../../config/release-signing-public.pem release-signing-public.pem
          sha256sum -c SHA256SUMS

      - name: Sign checksums
        env:
          VEXYL_RELEASE_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.VEXYL_RELEASE_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "$VEXYL_RELEASE_SIGNING_PRIVATE_KEY_PEM" ]; then
            printf 'Missing VEXYL_RELEASE_SIGNING_PRIVATE_KEY_PEM secret.\n' >&2
            exit 1
          fi

          private_key="$RUNNER_TEMP/vexyl-release-private.pem"
          printf '%s\n' "$VEXYL_RELEASE_SIGNING_PRIVATE_KEY_PEM" >"$private_key"
          chmod 0600 "$private_key"

          openssl dgst -sha256 \
            -sign "$private_key" \
            -out dist/packages/SHA256SUMS.sig \
            dist/packages/SHA256SUMS

          openssl dgst -sha256 \
            -verify config/release-signing-public.pem \
            -signature dist/packages/SHA256SUMS.sig \
            dist/packages/SHA256SUMS

      - name: Attest package provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/packages/*"

      - name: Write release notes
        env:
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          human_notes="$RUNNER_TEMP/release-human-notes.md"
          tag="${{ steps.meta.outputs.tag }}"

          if [ -n "${RELEASE_NOTES_INPUT:-}" ]; then
            printf '%s\n' "$RELEASE_NOTES_INPUT" >"$human_notes"
          elif [ "$(git cat-file -t "$tag" 2>/dev/null || true)" = "tag" ]; then
            git cat-file tag "$tag" | sed '1,/^$/d' >"$human_notes"
          else
            : >"$human_notes"
          fi

          if ! grep -q '[^[:space:]]' "$human_notes"; then
            printf 'Maintenance release for Vexyl Guard %s.\n' "$tag" >"$human_notes"
          fi

          if rg -n 'PRIVATE KEY|BEGIN [A-Z ]*PRIVATE|password[=:]|token[=:]|secret[=:]|api[_-]?key[=:]' "$human_notes" >/dev/null; then
            rg -n 'PRIVATE KEY|BEGIN [A-Z ]*PRIVATE|password[=:]|token[=:]|secret[=:]|api[_-]?key[=:]' "$human_notes" >&2 || true
            printf 'Release notes look like they may contain secret material.\n' >&2
            exit 1
          fi

          cat >RELEASE_NOTES.md <<EOF
          Vexyl Guard ${{ steps.meta.outputs.tag }} package release.

          ## Release notes
          EOF
          sed -i 's/^          //' RELEASE_NOTES.md
          cat "$human_notes" >>RELEASE_NOTES.md
          cat >>RELEASE_NOTES.md <<EOF

          ## Package artifacts

          This release publishes Linux package artifacts for operators who prefer package-managed installs:

          - Debian/Ubuntu package: vexyl-guard_${{ steps.meta.outputs.version }}-1_all.deb
          - RPM package: vexyl-guard-${{ steps.meta.outputs.version }}-1.noarch.rpm
          - Signed APT/YUM repository bundle: vexyl-package-repositories-${{ steps.meta.outputs.tag }}.tar.gz
          - Package repository public key: vexyl-package-repo-signing-public.asc

          RPM packages are signed with the package repository key. Verify downloads with SHA256SUMS, SHA256SUMS.sig, and release-signing-public.pem. Start in monitor mode before enabling local enforcement.
          EOF
          sed -i 's/^          //' RELEASE_NOTES.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/packages/* --clobber
            gh release edit "$tag" --title "Vexyl Guard $tag" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$tag" dist/packages/* --title "Vexyl Guard $tag" --notes-file RELEASE_NOTES.md --latest
          fi

      - name: Trigger and verify platform repository promotion
        env:
          GH_TOKEN: ${{ secrets.VEXYL_PLATFORM_PROMOTION_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            printf 'VEXYL_PLATFORM_PROMOTION_TOKEN is required for verified repository promotion.\n' >&2
            exit 1
          fi

          target_repo="vexyl-labs/vexyl-platform"
          workflow="promote-release-repo.yml"
          before="$(
            gh run list \
              --repo "$target_repo" \
              --workflow "$workflow" \
              --json databaseId \
              --limit 1 \
              --jq '.[0].databaseId // 0'
          )"

          gh api \
            --method POST \
            "repos/$target_repo/actions/workflows/$workflow/dispatches" \
            -f ref=main \
            -f "inputs[tag]=${{ steps.meta.outputs.tag }}" \
            -f "inputs[source_repo]=${{ github.repository }}" \
            -F "inputs[force_deploy]=true"

          promotion_run=""
          for _ in $(seq 1 40); do
            promotion_run="$(
              gh run list \
                --repo "$target_repo" \
                --workflow "$workflow" \
                --event workflow_dispatch \
                --json databaseId \
                --limit 20 \
                --jq "[.[] | select(.databaseId > $before)] | sort_by(.databaseId) | last | .databaseId // empty"
            )"
            [ -n "$promotion_run" ] && break
            sleep 3
          done

          [ -n "$promotion_run" ] || {
            printf 'Platform promotion dispatch did not produce a workflow run.\n' >&2
            exit 1
          }

          gh run watch "$promotion_run" --repo "$target_repo" --exit-status

      - name: Email failure alert
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VEXYL_ALERT_FROM: ${{ secrets.VEXYL_ALERT_FROM }}
          VEXYL_ALERT_RECIPIENTS: ${{ secrets.VEXYL_ALERT_RECIPIENTS }}
          VEXYL_ALERT_REPLY_TO: ${{ secrets.VEXYL_ALERT_REPLY_TO }}
        run: scripts/notify-workflow-failure.sh

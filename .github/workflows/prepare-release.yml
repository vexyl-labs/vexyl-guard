name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to create, for example 0.2.9"
        required: true
        type: string
      release_notes:
        description: "Human release notes to publish with the GitHub release"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c dpkg-dev file gnupg jq ripgrep rpm

      - name: Require matching release preflight
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          raw_version="${{ inputs.version }}"
          version="${raw_version#v}"
          current_sha="$(git rev-parse HEAD)"

          preflight_run="$(
            gh run list \
              --workflow "Release Preflight" \
              --branch "${{ github.ref_name }}" \
              --json conclusion,databaseId,displayTitle,headSha,status,url \
              --limit 50 \
              | jq -r \
                --arg plain_title "Release Preflight $version" \
                --arg tag_title "Release Preflight v$version" \
                --arg current_sha "$current_sha" \
                '[.[] | select(
                  (.displayTitle == $plain_title or .displayTitle == $tag_title) and
                  .headSha == $current_sha and
                  .status == "completed" and
                  .conclusion == "success"
                )] | sort_by(.databaseId) | last | @base64'
          )"

          if [ -z "$preflight_run" ]; then
            printf 'No successful Release Preflight run found for %s on commit %s. Run Release Preflight first, then rerun Prepare Release.\\n' "$raw_version" "$current_sha" >&2
            exit 1
          fi

          printf 'Using preflight run: %s\\n' "$(printf '%s' "$preflight_run" | base64 -d | jq -r .url)"

      - name: Configure release bot identity
        run: |
          git config user.name "vexyl-release-bot"
          git config user.email "release-bot@vexyl.dev"

      - name: Snapshot release workflow cursor
        id: release_cursor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          before="$(gh run list --workflow Release --json databaseId --limit 1 | jq -r '.[0].databaseId // 0')"
          printf 'before=%s\n' "$before" >>"$GITHUB_OUTPUT"

      - name: Prepare release commit and tag
        env:
          RELEASE_NOTES_JSON: ${{ toJson(inputs.release_notes) }}
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          tag="v$version"
          notes_file="$RUNNER_TEMP/release-notes.md"

          printf '%s' "$RELEASE_NOTES_JSON" | jq -r . >"$notes_file"
          if ! grep -q '[^[:space:]]' "$notes_file"; then
            printf 'Maintenance release for Vexyl Guard %s.\n' "$tag" >"$notes_file"
          fi

          scripts/prepare-release.sh \
            --version "${{ inputs.version }}" \
            --notes-file "$notes_file" \
            --commit \
            --tag \
            --push

      - name: Dispatch and watch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES_JSON: ${{ toJson(inputs.release_notes) }}
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          tag="v$version"
          before="${{ steps.release_cursor.outputs.before }}"
          notes="$(printf '%s' "$RELEASE_NOTES_JSON" | jq -r .)"

          jq -n \
            --arg tag "$tag" \
            --arg release_notes "$notes" \
            '{tag: $tag, release_notes: $release_notes}' \
            | gh workflow run release.yml --json

          release_run=""
          for _ in $(seq 1 40); do
            release_run="$(
              gh run list --workflow Release --json databaseId --limit 20 \
                | jq -r --argjson before "$before" '[.[] | select(.databaseId > $before)] | sort_by(.databaseId) | last | .databaseId // empty'
            )"
            [ -n "$release_run" ] && break
            sleep 3
          done

          [ -n "$release_run" ] || {
            printf 'Release workflow dispatch did not produce a run.\n' >&2
            exit 1
          }

          gh run watch "$release_run" --exit-status

      - name: Email failure alert
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VEXYL_ALERT_FROM: ${{ secrets.VEXYL_ALERT_FROM }}
          VEXYL_ALERT_RECIPIENTS: ${{ secrets.VEXYL_ALERT_RECIPIENTS }}
          VEXYL_ALERT_REPLY_TO: ${{ secrets.VEXYL_ALERT_REPLY_TO }}
        run: scripts/notify-workflow-failure.sh

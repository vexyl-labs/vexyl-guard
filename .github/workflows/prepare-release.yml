name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to create, for example 0.2.9"
        required: true
        type: string
      release_notes:
        description: "Human release notes to publish with the GitHub release"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c dpkg-dev file gnupg jq ripgrep rpm

      - name: Configure release bot identity
        run: |
          git config user.name "vexyl-release-bot"
          git config user.email "release-bot@vexyl.dev"

      - name: Snapshot release workflow cursor
        id: release_cursor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          before="$(gh run list --workflow Release --json databaseId --limit 1 | jq -r '.[0].databaseId // 0')"
          printf 'before=%s\n' "$before" >>"$GITHUB_OUTPUT"

      - name: Prepare release commit and tag
        env:
          RELEASE_NOTES_JSON: ${{ toJson(inputs.release_notes) }}
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          tag="v$version"
          notes_file="$RUNNER_TEMP/release-notes.md"

          printf '%s' "$RELEASE_NOTES_JSON" | jq -r . >"$notes_file"
          if ! grep -q '[^[:space:]]' "$notes_file"; then
            printf 'Maintenance release for Vexyl Guard %s.\n' "$tag" >"$notes_file"
          fi

          scripts/prepare-release.sh \
            --version "${{ inputs.version }}" \
            --notes-file "$notes_file" \
            --commit \
            --tag \
            --push

      - name: Dispatch and watch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES_JSON: ${{ toJson(inputs.release_notes) }}
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          tag="v$version"
          before="${{ steps.release_cursor.outputs.before }}"
          notes="$(printf '%s' "$RELEASE_NOTES_JSON" | jq -r .)"

          jq -n \
            --arg tag "$tag" \
            --arg release_notes "$notes" \
            '{tag: $tag, release_notes: $release_notes}' \
            | gh workflow run release.yml --json

          release_run=""
          for _ in $(seq 1 40); do
            release_run="$(
              gh run list --workflow Release --json databaseId --limit 20 \
                | jq -r --argjson before "$before" '[.[] | select(.databaseId > $before)] | sort_by(.databaseId) | last | .databaseId // empty'
            )"
            [ -n "$release_run" ] && break
            sleep 3
          done

          [ -n "$release_run" ] || {
            printf 'Release workflow dispatch did not produce a run.\n' >&2
            exit 1
          }

          gh run watch "$release_run" --exit-status
